# Public entrypoint for Insight Healthcare.
# clinic.callsphere.site → insight-frontend (Next.js).
# The AI service is intentionally NOT exposed; the frontend's /api/chat
# route proxies internally to insight-ai over the cluster network.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: insight-ingress
  namespace: insight-healthcare
  labels:
    app: insight-healthcare
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - clinic.callsphere.site
      secretName: insight-tls
  rules:
    - host: clinic.callsphere.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: insight-frontend
                port:
                  number: 80

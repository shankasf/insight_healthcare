# Insight Healthcare — Frontend (Next.js, TypeScript, App Router)
#
# Runs the source directly off the host via a hostPath volume — same
# pattern as other CallSphere apps. Pre-built `.next/` is reused if
# present (Next.js production build is heavy; only rebuild on rollout
# restart after code changes).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-frontend
  namespace: insight-healthcare
  labels:
    app: insight-healthcare
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insight-healthcare
      component: frontend
  template:
    metadata:
      labels:
        app: insight-healthcare
        component: frontend
    spec:
      containers:
        - name: insight-frontend
          image: node:20-bookworm
          imagePullPolicy: IfNotPresent
          workingDir: /app
          # Install deps if missing, build if .next/BUILD_ID is missing, then start.
          # Skips work on every restart once the .next directory exists on the host.
          command:
            - sh
            - -c
            - |
              set -e
              if [ ! -d node_modules ] || [ ! -f node_modules/.package-lock.json ]; then
                npm install --include=dev --include=optional --ignore-scripts
              fi
              if [ ! -f .next/BUILD_ID ]; then
                npm run build
              fi
              exec npm run start
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=2048"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: insight-config
                  key: AI_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: frontend-source
              mountPath: /app
      volumes:
        - name: frontend-source
          hostPath:
            path: /home/ubuntu/apps/insight_healthcare/frontend
            type: Directory

# Insight Healthcare — AI Service (Python FastAPI + OpenAI Agents SDK)
#
# Runs the source directly off the host via a hostPath volume — same
# pattern as other CallSphere apps (hotel_management, prepsphere, etc.).
# No image build/push required: code changes on disk + a pod restart
# (or uvicorn's --reload) pick up immediately.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-ai
  namespace: insight-healthcare
  labels:
    app: insight-healthcare
    component: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insight-healthcare
      component: ai
  template:
    metadata:
      labels:
        app: insight-healthcare
        component: ai
    spec:
      # initContainer installs Python deps and runs Alembic migrations
      # against the central Postgres before the main container starts.
      initContainers:
        - name: install-and-migrate
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command:
            - sh
            - -c
            - |
              set -e
              pip install --no-cache-dir -r requirements.txt
              alembic upgrade head
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: insight-app-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          volumeMounts:
            - name: ai-source
              mountPath: /app
      containers:
        - name: insight-ai
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command:
            - sh
            - -c
            - |
              set -e
              pip install --no-cache-dir -r requirements.txt
              exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: insight-app-secrets
                  key: OPENAI_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: insight-app-secrets
                  key: DATABASE_URL
            - name: MODEL_NAME
              value: "gpt-5"
            - name: EMBEDDING_MODEL
              value: "text-embedding-3-small"
            - name: CORS_ORIGINS
              value: "https://clinic.callsphere.site"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: ai-source
              mountPath: /app
      volumes:
        - name: ai-source
          hostPath:
            path: /home/ubuntu/apps/insight_healthcare/ai-service
            type: Directory
